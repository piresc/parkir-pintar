# GitHub Actions PR Checks Workflow
# Runs only on pull requests to main.
# Quality gates: secret-scan -> [lint, test, security, vulncheck, proto-check, frontend-check]
#                test + security -> sonar

name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "20"
  GOLANGCI_LINT_VERSION: "v2.12.2"
  GOSEC_VERSION: "v2.22.3"
  GOVULNCHECK_VERSION: "v1.1.4"

jobs:
  # ---------------------------------------------------------------------------
  # Secret scanning via gitleaks
  # ---------------------------------------------------------------------------
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Lint via golangci-lint
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@${{ env.GOLANGCI_LINT_VERSION }}
      - name: Run golangci-lint
        run: golangci-lint run --timeout 5m

  # ---------------------------------------------------------------------------
  # Test with race detector + coverage
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Run unit tests with race detector and coverage
        run: |
          go test -race -covermode=atomic -coverprofile=coverage.txt -short ./...

      - name: Display coverage summary
        run: go tool cover -func=coverage.txt

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.txt

  # ---------------------------------------------------------------------------
  # Security scan via gosec
  # ---------------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@${{ env.GOSEC_VERSION }}

      - name: Run gosec
        run: gosec -exclude=G401,G304,G501,G505,G103,G104,G109,G115 -exclude-dir=proto -exclude-dir=tests -fmt=sonarqube -out=sonar-gosec.json ./...

      - name: Upload gosec report
        uses: actions/upload-artifact@v4
        with:
          name: gosec-report
          path: sonar-gosec.json

  # ---------------------------------------------------------------------------
  # Vulnerability check via govulncheck
  # ---------------------------------------------------------------------------
  vulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}

      - name: Run govulncheck
        run: govulncheck -scan package ./...

  # ---------------------------------------------------------------------------
  # Proto lint and breaking change detection via buf
  # ---------------------------------------------------------------------------
  proto-check:
    name: Proto Check
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1

      - name: Lint proto files
        run: buf lint proto/

      - name: Check for breaking changes
        run: buf breaking proto/ --against '.git#branch=main,subdir=proto'

  # ---------------------------------------------------------------------------
  # SonarCloud analysis (quality gate — blocks PR on failure)
  # ---------------------------------------------------------------------------
  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: [test, security]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: coverage

      - uses: actions/download-artifact@v4
        with:
          name: gosec-report

      - uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # ---------------------------------------------------------------------------
  # Frontend check via ESLint + TypeScript
  # ---------------------------------------------------------------------------
  frontend-check:
    name: Frontend Check
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npx eslint .

      - name: Run TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit
