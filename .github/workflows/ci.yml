# GitHub Actions CI Pipeline
# Triggers on push to main and pull requests.
# Stages: secret-scan → lint → test (with race + coverage) → sonar

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # -------------------------------------------------------------------------
  # Secret scanning via gitleaks
  # -------------------------------------------------------------------------
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # -------------------------------------------------------------------------
  # Lint via golangci-lint
  # -------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: secret-scan
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
      - name: Run golangci-lint
        run: golangci-lint run --timeout 5m

  # -------------------------------------------------------------------------
  # Test with race detector + coverage comparison
  # -------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run unit tests with race detector and coverage
        run: |
          go test -v -race -covermode=atomic -coverprofile=coverage.txt -short ./...

      - name: Run benchmarks
        run: |
          go test -run=^$ -bench=. -benchmem -short ./... | tee bench-results.txt

      - name: Display coverage summary
        run: go tool cover -func=coverage.txt

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.txt

  # -------------------------------------------------------------------------
  # Security scan via gosec
  # -------------------------------------------------------------------------
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: secret-scan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: gosec -exclude=G401,G304,G501,G505,G103,G104,G109,G115 -exclude-dir=proto -exclude-dir=tests -fmt=sonarqube -out=sonar-gosec.json ./...

      - name: Upload gosec report
        uses: actions/upload-artifact@v4
        with:
          name: gosec-report
          path: sonar-gosec.json

  # -------------------------------------------------------------------------
  # Vulnerability check via govulncheck
  # -------------------------------------------------------------------------
  vulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    needs: secret-scan
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck -scan package ./...

  # -------------------------------------------------------------------------
  # SonarCloud analysis
  # -------------------------------------------------------------------------
  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: coverage

      - uses: actions/download-artifact@v4
        with:
          name: gosec-report

      - uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # -------------------------------------------------------------------------
  # DAST via OWASP ZAP (baseline scan against staging)
  # -------------------------------------------------------------------------
  dast:
    name: DAST (OWASP ZAP)
    runs-on: ubuntu-latest
    needs: build-push-staging
    if: github.event_name == 'push'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: "https://parkir-pintar.piresc.dev"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a"

      - name: Upload ZAP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: report_html.html

  # -------------------------------------------------------------------------
  # Proto lint and breaking change detection via buf
  # -------------------------------------------------------------------------
  proto-check:
    name: Proto Check
    runs-on: ubuntu-latest
    needs: secret-scan
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install buf
        uses: bufbuild/buf-setup-action@v1

      - name: Lint proto files
        run: buf lint proto/

      - name: Check for breaking changes
        run: buf breaking proto/ --against '.git#branch=main,subdir=proto' || true

  # -------------------------------------------------------------------------
  # Build and push per-service Docker images to GHCR (only on push to main)
  # -------------------------------------------------------------------------
  build-push-staging:
    name: Build & Push ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [secret-scan, test, lint, security]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [gateway, reservation, billing, payment, search, presence, analytics]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.service }} image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./cmd/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:main-${{ github.sha }}
          build-args: |
            VERSION=${{ github.sha }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}

  # -------------------------------------------------------------------------
  # Build and push Frontend Docker image to GHCR (only on push to main)
  # -------------------------------------------------------------------------
  build-push-frontend:
    name: Build & Push Frontend Image
    runs-on: ubuntu-latest
    needs: [secret-scan]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-frontend:latest
            ghcr.io/${{ github.repository }}-frontend:main-${{ github.sha }}

  # -------------------------------------------------------------------------
  # Deploy to staging via Coolify API restart (after both images pushed)
  # -------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-push-staging, build-push-frontend]
    if: github.event_name == 'push'
    steps:
      - name: Trigger Coolify service restart
        run: |
          curl -sSf -X POST \
            "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            --max-time 30
