name: Deploy Production

on:
  workflow_run:
    workflows: ["Build Production"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag (e.g. v0.1.0)"
        required: true
        type: string
        default: "v0.1.0"

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-southeast-3
  K8S_NAMESPACE: pirescer-parkir-pintar

jobs:
  deploy:
    name: Deploy to AWS EKS
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name piresc-parkir

      - name: Determine version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "VERSION=latest-prod" >> "$GITHUB_ENV"
          fi

      - name: Apply service manifests
        run: |
          for svc in gateway reservation billing payment search presence analytics; do
            kubectl apply -f deploy/production/kubernetes/services/$svc/deployment.yaml
          done
          kubectl apply -f deploy/production/kubernetes/autoscaling/hpa.yaml

      - name: Update images to release version
        run: |
          for svc in gateway reservation billing payment search presence analytics; do
            echo "Updating $svc to $VERSION"
            kubectl set image deployment/$svc $svc=ghcr.io/${{ github.repository }}/${svc}:${VERSION} -n $K8S_NAMESPACE
          done

      - name: Wait for all rollouts
        run: |
          for svc in gateway reservation billing payment search presence analytics; do
            echo "Waiting for $svc rollout..."
            kubectl rollout status deployment/$svc -n $K8S_NAMESPACE --timeout=1000s
          done

      - name: Smoke test
        run: |
          kubectl exec deployment/gateway -n $K8S_NAMESPACE -- wget -qO- --timeout=10 http://localhost:8080/health
          echo "Health check passed!"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "::error::Deploy failed — rolling back all services"
          for svc in gateway reservation billing payment search presence analytics; do
            kubectl rollout undo deployment/$svc -n $K8S_NAMESPACE || true
          done
