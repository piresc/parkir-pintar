name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag (e.g. v1.0.0)"
        required: true
        type: string
        default: "v1.0.0"

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-southeast-1
  K8S_NAMESPACE: pirescer-parkir-pintar

jobs:
  deploy:
    name: Deploy to AWS EKS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-actions-deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform Init
        working-directory: infra/aws
        run: terraform init

      - name: Terraform Plan
        working-directory: infra/aws
        run: |
          terraform plan \
            -var="db_username=${{ secrets.DB_USERNAME }}" \
            -var="db_password=${{ secrets.DB_PASSWORD }}" \
            -var="redis_auth_token=${{ secrets.REDIS_AUTH_TOKEN }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="ghcr_username=${{ github.actor }}" \
            -var="ghcr_token=${{ secrets.GITHUB_TOKEN }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: infra/aws
        run: terraform apply -auto-approve tfplan

      - name: Configure kubectl
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name pirescer-parkir-pintar-production

      - name: Deploy observability stack
        run: |
          kubectl apply -f infra/aws/k8s/observability/namespace.yaml
          kubectl apply -f infra/aws/k8s/observability/alloy.yaml
          kubectl apply -f infra/aws/k8s/observability/prometheus.yaml
          kubectl apply -f infra/aws/k8s/observability/tempo.yaml
          kubectl apply -f infra/aws/k8s/observability/loki.yaml
          kubectl apply -f infra/aws/k8s/observability/grafana.yaml

      - name: Apply K8s base manifests
        run: |
          kubectl apply -f infra/aws/k8s/base/nats-configmap.yaml
          kubectl apply -f infra/aws/k8s/base/nats-statefulset.yaml
          kubectl apply -f infra/aws/k8s/base/configmap.yaml

      - name: Wait for NATS ready
        run: |
          kubectl wait --for=condition=ready pod -l app=nats -n $K8S_NAMESPACE --timeout=180s

      - name: Apply all service manifests
        run: |
          for svc in gateway reservation billing payment search presence analytics; do
            kubectl apply -f infra/aws/k8s/services/$svc/deployment.yaml
          done
          kubectl apply -f infra/aws/k8s/services/frontend/deployment.yaml
          kubectl apply -f infra/aws/k8s/services/frontend/ingress.yaml

      - name: Run DB migrations
        run: |
          kubectl apply -f infra/aws/k8s/migrations/migration-job.yaml
          kubectl wait --for=condition=complete job/db-migrate -n $K8S_NAMESPACE --timeout=120s

      - name: Update images to release version
        env:
          VERSION: ${{ github.event.inputs.version }}
        run: |
          for svc in gateway reservation billing payment search presence analytics; do
            echo "Updating $svc to $VERSION"
            kubectl set image deployment/$svc $svc=ghcr.io/${{ github.repository }}/${svc}:${VERSION} -n $K8S_NAMESPACE
          done
          kubectl set image deployment/frontend frontend=ghcr.io/${{ github.repository }}-frontend:${VERSION} -n $K8S_NAMESPACE

      - name: Wait for all rollouts
        run: |
          for svc in gateway reservation billing payment search presence analytics frontend; do
            echo "Waiting for $svc rollout..."
            kubectl rollout status deployment/$svc -n $K8S_NAMESPACE --timeout=300s
          done

      - name: Smoke test
        run: |
          echo "Waiting 30s for LB propagation..."
          sleep 30
          kubectl run smoke-test --rm -i --restart=Never --image=curlimages/curl:latest -n $K8S_NAMESPACE -- \
            curl -sf http://gateway.$K8S_NAMESPACE.svc.cluster.local:8080/health
          echo "Health check passed!"

      - name: Rollback on failure
        if: failure()
        run: |
          echo "::error::Deploy failed — rolling back all services"
          for svc in gateway reservation billing payment search presence analytics frontend; do
            kubectl rollout undo deployment/$svc -n $K8S_NAMESPACE || true
          done
