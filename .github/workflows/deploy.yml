# Manual deployment workflow
# Allows selective service deployment via GitHub UI dropdown

name: Deploy Service

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to build and deploy"
        required: true
        type: choice
        options:
          - all
          - gateway
          - reservation
          - billing
          - payment
          - search
          - presence
          - frontend

permissions:
  contents: read
  packages: write

jobs:
  # -------------------------------------------------------------------------
  # Build and push selected service image(s)
  # -------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJSON(
          inputs.service == 'all' && '["gateway","reservation","billing","payment","search","presence"]' ||
          format('["{0}"]', inputs.service)
          ) }}
        exclude:
          - service: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push service image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./cmd/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ github.sha }}
          build-args: |
            VERSION=${{ github.sha }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.repository.updated_at }}

  # -------------------------------------------------------------------------
  # Build frontend (only if selected)
  # -------------------------------------------------------------------------
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    if: inputs.service == 'all' || inputs.service == 'frontend'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-frontend:latest
            ghcr.io/${{ github.repository }}-frontend:${{ github.sha }}

  # -------------------------------------------------------------------------
  # Deploy via Coolify restart
  # -------------------------------------------------------------------------
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: always() && !failure() && !cancelled()
    steps:
      - name: Trigger Coolify service restart
        run: |
          echo "Deploying service(s): ${{ inputs.service }}"
          curl -sSf -X POST \
            "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            --max-time 30
