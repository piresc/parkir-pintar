# GitLab CI/CD Pipeline for Assessment Boilerplate
# Stages: lint → test → security → build → deploy
# References shared Go pipeline templates from the organization.

include:
  - project: my-telkomsel/pipeline-template-assets/stage-templates
    ref: new_main
    file: go-stages.yml

variables:
  PROJECT_NAME: "MyTelkomsel"
  SERVICE_NAME: "parkir-pintar"
  GO_DOCKER_VERSION: "1.25.0"
  GOLANG_VERSION: "1.25.0"
  TEST_COVERAGE_FILE: "coverage.txt"
  UNIT_TEST_DIR: "./..."
  DOCKERFILE_PATH: ./Dockerfile
  ZAP_DOCKER_VERSION: "2.12.0"
  BASE_IMG_GO_SEC: ${JFROG_DOCKER_REGISTRY}/securego/gosec:2.23.0

stages:
  - lint
  - test
  - security
  - build
  - deploy

# ---------------------------------------------------------------------------
# Stage: lint
# ---------------------------------------------------------------------------
lint:
  stage: lint
  image: golangci/golangci-lint:v2.1.6
  script:
    - golangci-lint run --timeout 5m ./...
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# Stage: test
# ---------------------------------------------------------------------------
unit-test:
  stage: test
  image: golang:${GOLANG_VERSION}
  script:
    - go test -v -race -covermode=atomic -coverprofile=${TEST_COVERAGE_FILE} ${UNIT_TEST_DIR}
    - go tool cover -func=${TEST_COVERAGE_FILE}
  artifacts:
    paths:
      - ${TEST_COVERAGE_FILE}
    expire_in: 1 week
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# Stage: security
# ---------------------------------------------------------------------------
gosec:
  stage: security
  image: ${BASE_IMG_GO_SEC}
  script:
    - gosec -exclude=G401,G304,G501,G505 -fmt=sonarqube -out=sonar-gosec.json ./...
  artifacts:
    paths:
      - sonar-gosec.json
    expire_in: 1 week
  allow_failure: false
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

gitleaks:
  stage: security
  image: zricethezav/gitleaks:latest
  script:
    - gitleaks detect --source=. --config=.gitleaks.toml --verbose
  allow_failure: false
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

sonarqube:
  stage: security
  image:
    name: sonarsource/sonar-scanner-cli:latest
    entrypoint: [""]
  script:
    - sonar-scanner
  dependencies:
    - unit-test
    - gosec
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ---------------------------------------------------------------------------
# Stage: build
# ---------------------------------------------------------------------------
docker-build:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker build
        --build-arg VERSION=${CI_COMMIT_TAG:-dev}
        --build-arg GIT_COMMIT=${CI_COMMIT_SHORT_SHA}
        --build-arg BUILD_TIME=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
        -t ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}
        -f ${DOCKERFILE_PATH} .
    - docker push ${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# ---------------------------------------------------------------------------
# Stage: deploy
# ---------------------------------------------------------------------------
deploy-staging:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - kubectl set image deployment/${SERVICE_NAME}
        ${SERVICE_NAME}=${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}
        -n staging
  environment:
    name: staging
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

deploy-production:
  stage: deploy
  image: bitnami/kubectl:latest
  script:
    - kubectl set image deployment/${SERVICE_NAME}
        ${SERVICE_NAME}=${CI_REGISTRY_IMAGE}:${CI_COMMIT_SHORT_SHA}
        -n production
  environment:
    name: production
  when: manual
  rules:
    - if: $CI_COMMIT_TAG
