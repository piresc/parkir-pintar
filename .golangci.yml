# ParkirPintar golangci-lint v2 configuration
version: "2"

run:
  timeout: 5m
  tests: true


linters:
  default: none
  enable:
    # Default linters
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    # Additional linters
    - bodyclose
    - contextcheck
    - durationcheck
    - errname
    - errorlint
    - exhaustive
    - forcetypeassert
    - goconst
    - gocritic
    - gosec
    - misspell
    - nilerr
    - noctx
    - prealloc
    - predeclared
    - revive
    - unconvert
    - unparam
    - wastedassign

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false


    goconst:
      min-len: 3
      min-occurrences: 3

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - hugeParam
        - paramTypeCombine
        - unnamedResult
        - commentedOutCode
        - ptrToRefParam

    gosec:
      excludes:
        - G104
        - G109
        - G115

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
        - name: empty-block
        - name: superfluous-else
        - name: unreachable-code

    exhaustive:
      default-signifies-exhaustive: true

    misspell: {}

  exclusions:
    presets:
      - comments
      - std-error-handling
    rules:
      # Exclude some linters from running on test files
      - path: _test\.go
        linters:
          - goconst
          - gosec
          - forcetypeassert
          - unparam
          - prealloc
          - errcheck
          - noctx
          - gocritic
          - noctx
          - revive

      # Exclude generated protobuf files from all linters
      - path: ".*\\.pb\\.go$"
        linters:
          - govet
          - revive
          - gocritic
          - errcheck
          - staticcheck
          - unused

      # Exclude generated gateway files
      - path: ".*\\.pb\\.gw\\.go$"
        linters:
          - govet
          - revive
          - gocritic
          - errcheck
          - staticcheck
          - unused

      # Allow fmt.Print in cmd/ for CLI output
      - path: cmd/
        linters:
          - forbidigo

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - parkir-pintar
  exclusions:
    paths:
      - ".*\\.pb\\.go$"
      - ".*\\.pb\\.gw\\.go$"

issues:
  max-issues-per-linter: 50
  max-same-issues: 5

severity:
  default: warning
  rules:
    - linters:
        - errcheck
        - govet
        - staticcheck
        - gosec
      severity: error
    - linters:
        - revive
        - gocritic
        - errorlint
      severity: warning
    - linters:
        - misspell
      severity: info
