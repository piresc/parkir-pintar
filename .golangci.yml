# ParkirPintar golangci-lint configuration
# Run: golangci-lint run ./...

run:
  timeout: 5m
  tests: true
  skip-dirs:
    - vendor
  skip-files:
    - ".*\\.pb\\.go$"
    - ".*\\.pb\\.gw\\.go$"

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
  sort-results: true

linters:
  disable-all: true
  enable:
    # Default linters
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    # Additional linters
    - bodyclose
    - contextcheck
    - durationcheck
    - errname
    - errorlint
    - exhaustive
    - exportloopref
    - forcetypeassert
    - goconst
    - gocritic
    - gofmt
    - goimports
    - gosec
    - misspell
    - nilerr
    - noctx
    - prealloc
    - predeclared
    - revive
    - unconvert
    - unparam
    - wastedassign

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    check-shadowing: true

  goconst:
    min-len: 3
    min-occurrences: 3

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
    disabled-checks:
      - hugeParam

  goimports:
    local-prefixes: github.com/parkir-pintar

  gosec:
    excludes:
      - G104 # Unhandled errors (covered by errcheck)

  revive:
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unreachable-code

  exhaustive:
    default-signifies-exhaustive: true

  misspell:
    locale: US

issues:
  max-issues-per-linter: 50
  max-same-issues: 5

  exclude-rules:
    # Exclude some linters from running on test files
    - path: _test\.go
      linters:
        - goconst
        - gosec
        - forcetypeassert
        - unparam
        - prealloc

    # Exclude generated protobuf files from all linters
    - path: ".*\\.pb\\.go$"
      linters:
        - govet
        - revive
        - gocritic
        - goimports
        - gofmt
        - errcheck
        - staticcheck
        - unused
        - gosimple

    # Exclude generated gateway files
    - path: ".*\\.pb\\.gw\\.go$"
      linters:
        - govet
        - revive
        - gocritic
        - goimports
        - gofmt
        - errcheck
        - staticcheck
        - unused
        - gosimple

    # Allow fmt.Print in cmd/ for CLI output
    - path: cmd/
      linters:
        - forbidigo

  exclude-use-default: false

severity:
  default-severity: warning
  case-sensitive: false
  rules:
    - linters:
        - errcheck
        - govet
        - staticcheck
        - gosec
      severity: error
    - linters:
        - revive
        - gocritic
        - errorlint
      severity: warning
    - linters:
        - misspell
        - gofmt
        - goimports
      severity: info
