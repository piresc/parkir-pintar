version: "2"

linters:
  default: standard
  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (net.Listener).Close
        - (*net/http.Response).Body.Close
        - (*database/sql.DB).Close
        - (*google.golang.org/grpc.ClientConn).Close
        - (*github.com/redis/go-redis/v9.Client).Close
        - os.Setenv
        - os.Unsetenv

issues:
  exclude-dirs:
    - vendor
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
    - path: tests/
      linters:
        - errcheck
        - staticcheck
