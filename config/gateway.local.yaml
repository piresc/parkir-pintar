# Gateway service - local configuration
# Secrets (DB_PASSWORD, JWT_SECRET, etc.) come from config/.env

app:
  name: parkir-pintar-gateway
  environment: local
  debug: true
  version: "0.1.0"

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 30
  write_timeout: 30
  shutdown_timeout: 30
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:3002"

redis:
  db: 0
  pool_size: 10

jwt:
  expiration: 60
  issuer: parkir-pintar

tracing:
  enabled: false
  service_name: parkir-pintar-gateway
  sample_rate: 1.0
  exclude_paths:
    - /health
    - /health/live
    - /health/ready
  exporter: noop

logger:
  level: debug
  format: json

grpc:
  client:
    dial_timeout: 5s
    keepalive_time: 30s
    keepalive_timeout: 10s
  rate_limit:
    requests_per_second: 100
    burst_size: 200

nats:
  enabled: false
