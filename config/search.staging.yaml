# Search service - staging configuration
# Secrets (DB, Redis, NATS, JWT, etc.) come from environment variables.

app:
  name: parkir-pintar-search
  environment: staging
  debug: false
  version: "0.1.0"

server:
  host: "0.0.0.0"
  port: 8084
  read_timeout: 15
  write_timeout: 15
  shutdown_timeout: 30
  allowed_origins:
    - "https://staging.parkir-pintar.id"

database:
  schema: public
  ssl_mode: require
  max_conns: 25
  idle_conns: 5
  max_lifetime: 15

redis:
  db: 1
  pool_size: 15

jwt:
  expiration: 60
  issuer: parkir-pintar

tracing:
  enabled: true
  service_name: parkir-pintar-search
  sample_rate: 0.5
  exclude_paths:
    - /health
    - /health/live
    - /health/ready
  exporter: otlp

logger:
  level: info
  format: json

grpc:
  server:
    port: 9094
    max_conn_age: 5m
    shutdown_timeout: 30s
    request_timeout: 30s
  client:
    dial_timeout: 5s
    keepalive_time: 30s
    keepalive_timeout: 10s
  rate_limit:
    requests_per_second: 200
    burst_size: 400

nats:
  enabled: true
