# Gateway service - staging configuration
# Secrets (DB, Redis, NATS, JWT, etc.) come from environment variables.

app:
  name: parkir-pintar-gateway
  environment: staging
  debug: false
  version: "0.1.0"

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 30
  write_timeout: 30
  shutdown_timeout: 30
  allowed_origins:
    - "https://parkir-pintar.piresc.dev"

redis:
  db: 0
  pool_size: 15

jwt:
  expiration: 60
  issuer: parkir-pintar

tracing:
  enabled: true
  service_name: parkir-pintar-gateway
  sample_rate: 0.5
  exclude_paths:
    - /health
    - /health/live
    - /health/ready
  exporter: otlp

logger:
  level: info
  format: json

grpc:
  client:
    dial_timeout: 5s
    keepalive_time: 30s
    keepalive_timeout: 10s
  rate_limit:
    requests_per_second: 500
    burst_size: 1000

nats:
  enabled: true
