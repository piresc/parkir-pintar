# Docker Compose for ParkirPintar — Green Deployment
# Blue-Green deployment strategy: this is the GREEN environment.
# Image tag is pinned per release — never use :latest in production.
# Traefik priority 50 = standby (lower priority, traffic goes to blue by default).

x-common-env: &common-env
  APP_ENV: production
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_USERNAME: ${DB_USERNAME}
  DB_PASSWORD: ${DB_PASSWORD}
  DB_DATABASE: ${DB_DATABASE}
  DB_SSL_MODE: require
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_PASSWORD: ${REDIS_PASSWORD}
  NATS_URL: nats://nats:4222
  JWT_SECRET: ${JWT_SECRET}
  TRACING_ENABLED: "true"
  TRACING_EXPORTER: "otlp-grpc"
  TRACING_OTLP_ENDPOINT: ${TRACING_OTLP_ENDPOINT:-otel-collector:4317}
  TRACING_SAMPLE_RATE: "0.1"

x-healthcheck-grpc: &healthcheck-grpc
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 20s

services:
  gateway-green:
    image: ghcr.io/piresc/parkir-pintar:${IMAGE_TAG:-v1.0.0}
    container_name: parkir-gateway-green
    command: ["/app/gateway"]
    environment:
      <<: *common-env
      APP_NAME: parkir-pintar-gateway
      SERVER_PORT: "8080"
      GRPC_RESERVATION_TARGET: reservation-green:9090
      GRPC_SEARCH_TARGET: search-green:9090
      GRPC_PAYMENT_TARGET: payment-green:9090
      GRPC_PRESENCE_TARGET: presence-green:9090
      SERVER_ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
    depends_on:
      reservation-green:
        condition: service_healthy
      search-green:
        condition: service_healthy
    networks:
      - parkir-net
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.parkir-green.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.parkir-green.entrypoints=websecure"
      - "traefik.http.routers.parkir-green.tls.certresolver=letsencrypt"
      - "traefik.http.routers.parkir-green.priority=50"
      - "traefik.http.services.parkir-green.loadbalancer.server.port=8080"
      - "traefik.http.services.parkir-green.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.parkir-green.loadbalancer.healthcheck.interval=5s"
      - "parkir.deployment=green"
      - "parkir.version=${IMAGE_TAG:-v1.0.0}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  search-green:
    image: ghcr.io/piresc/parkir-pintar:${IMAGE_TAG:-v1.0.0}
    container_name: parkir-search-green
    command: ["/app/search"]
    environment:
      <<: *common-env
      APP_NAME: parkir-pintar-search
      GRPC_SERVER_PORT: "9090"
      DB_SCHEMA: search
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - parkir-net
    restart: unless-stopped
    labels:
      - "parkir.deployment=green"
      - "parkir.version=${IMAGE_TAG:-v1.0.0}"
    healthcheck:
      test: ["CMD-SHELL", "ps | grep -v grep | grep /app/search || exit 1"]
      <<: *healthcheck-grpc

  reservation-green:
    image: ghcr.io/piresc/parkir-pintar:${IMAGE_TAG:-v1.0.0}
    container_name: parkir-reservation-green
    command: ["/app/reservation"]
    environment:
      <<: *common-env
      APP_NAME: parkir-pintar-reservation
      GRPC_SERVER_PORT: "9090"
      DB_SCHEMA: reservation
      GRPC_BILLING_TARGET: billing-green:9090
      GRPC_PAYMENT_TARGET: payment-green:9090
      PAYMENT_TIMEOUT_MINUTES: "10"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      billing-green:
        condition: service_healthy
      payment-green:
        condition: service_healthy
    networks:
      - parkir-net
    restart: unless-stopped
    labels:
      - "parkir.deployment=green"
      - "parkir.version=${IMAGE_TAG:-v1.0.0}"
    healthcheck:
      test: ["CMD-SHELL", "ps | grep -v grep | grep /app/reservation || exit 1"]
      <<: *healthcheck-grpc

  billing-green:
    image: ghcr.io/piresc/parkir-pintar:${IMAGE_TAG:-v1.0.0}
    container_name: parkir-billing-green
    command: ["/app/billing"]
    environment:
      <<: *common-env
      APP_NAME: parkir-pintar-billing
      GRPC_SERVER_PORT: "9090"
      DB_SCHEMA: billing
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - parkir-net
    restart: unless-stopped
    labels:
      - "parkir.deployment=green"
      - "parkir.version=${IMAGE_TAG:-v1.0.0}"
    healthcheck:
      test: ["CMD-SHELL", "ps | grep -v grep | grep /app/billing || exit 1"]
      <<: *healthcheck-grpc

  payment-green:
    image: ghcr.io/piresc/parkir-pintar:${IMAGE_TAG:-v1.0.0}
    container_name: parkir-payment-green
    command: ["/app/payment"]
    environment:
      <<: *common-env
      APP_NAME: parkir-pintar-payment
      GRPC_SERVER_PORT: "9090"
      DB_SCHEMA: payment
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - parkir-net
    restart: unless-stopped
    labels:
      - "parkir.deployment=green"
      - "parkir.version=${IMAGE_TAG:-v1.0.0}"
    healthcheck:
      test: ["CMD-SHELL", "ps | grep -v grep | grep /app/payment || exit 1"]
      <<: *healthcheck-grpc

  presence-green:
    image: ghcr.io/piresc/parkir-pintar:${IMAGE_TAG:-v1.0.0}
    container_name: parkir-presence-green
    command: ["/app/presence"]
    environment:
      <<: *common-env
      APP_NAME: parkir-pintar-presence
      GRPC_SERVER_PORT: "9090"
      DB_SCHEMA: presence
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - parkir-net
    restart: unless-stopped
    labels:
      - "parkir.deployment=green"
      - "parkir.version=${IMAGE_TAG:-v1.0.0}"
    healthcheck:
      test: ["CMD-SHELL", "ps | grep -v grep | grep /app/presence || exit 1"]
      <<: *healthcheck-grpc

  notification-green:
    image: ghcr.io/piresc/parkir-pintar:${IMAGE_TAG:-v1.0.0}
    container_name: parkir-notification-green
    command: ["/app/notification"]
    environment:
      <<: *common-env
      APP_NAME: parkir-pintar-notification
      GRPC_SERVER_PORT: "9090"
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - parkir-net
    restart: unless-stopped
    labels:
      - "parkir.deployment=green"
      - "parkir.version=${IMAGE_TAG:-v1.0.0}"
    healthcheck:
      test: ["CMD-SHELL", "ps | grep -v grep | grep /app/notification || exit 1"]
      <<: *healthcheck-grpc

  # Shared infrastructure (not duplicated between blue/green)
  postgres:
    image: postgres:14-alpine
    container_name: parkir-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - parkir-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.0-alpine
    container_name: parkir-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    networks:
      - parkir-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nats:
    image: nats:2.11-alpine
    container_name: parkir-nats
    command: ["--jetstream", "--store_dir=/data", "--http_port=8222"]
    volumes:
      - nats_data:/data
    networks:
      - parkir-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
  nats_data:

networks:
  parkir-net:
    external: true
