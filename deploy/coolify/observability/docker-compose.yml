# ParkirPintar — Shared Observability Stack
# Managed by Coolify. Reusable across projects via external networks.
# All UIs bound to Tailscale IP only (not public).

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: obs-prometheus
    restart: unless-stopped
    ports:
      - "100.79.123.39:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.enable-remote-write-receiver"
    networks:
      - observability
      - infra-backend

  grafana:
    image: grafana/grafana:latest
    container_name: obs-grafana
    restart: unless-stopped
    ports:
      - "100.79.123.39:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    networks:
      - observability

  alertmanager:
    image: prom/alertmanager:latest
    container_name: obs-alertmanager
    restart: unless-stopped
    ports:
      - "100.79.123.39:9093:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    networks:
      - observability

  tempo:
    image: grafana/tempo:latest
    container_name: obs-tempo
    restart: unless-stopped
    ports:
      - "100.79.123.39:3200:3200"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./tempo/tempo.yml:/etc/tempo.yml:ro
      - tempo_data:/var/tempo
    command:
      - "-config.file=/etc/tempo.yml"
    networks:
      - observability

  loki:
    image: grafana/loki:3.1.0
    container_name: obs-loki
    restart: unless-stopped
    ports:
      - "100.79.123.39:3100:3100"
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    command:
      - "-config.file=/etc/loki/loki.yml"
    networks:
      - observability

  alloy:
    image: grafana/alloy:latest
    container_name: obs-alloy
    restart: unless-stopped
    ports:
      - "100.79.123.39:12345:12345"
      - "4319:4319"
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
    command:
      - "run"
      - "--server.http.listen-addr=0.0.0.0:12345"
      - "/etc/alloy/config.alloy"
    networks:
      - observability
      - infra-backend

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: obs-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres:5432/${DB_DATABASE}?sslmode=disable"
    networks:
      - observability
      - infra-backend

  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: obs-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    networks:
      - observability
      - infra-backend

  nats-exporter:
    image: natsio/prometheus-nats-exporter:latest
    container_name: obs-nats-exporter
    restart: unless-stopped
    command: ["-varz", "-jsz=all", "-connz", "-routez", "-subz", "http://nats:8222"]
    networks:
      - observability
      - infra-backend

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  tempo_data:
  loki_data:

networks:
  observability:
    driver: bridge
    name: observability
  infra-backend:
    external: true
    name: infra-backend
