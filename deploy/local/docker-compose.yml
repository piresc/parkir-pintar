# Docker Compose for ParkirPintar — Smart Parking Marketplace
# All credentials use ${ENV_VAR} references — no hardcoded secrets.
# Copy example.env to .env and fill in your values before running.

services:
  postgres:
    image: postgres:14-alpine
    container_name: assessment-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  nats:
    image: nats:2.10-alpine
    container_name: assessment-nats
    command: ["--jetstream", "--store_dir=/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7.0-alpine
    container_name: assessment-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  gateway:
    build:
      context: .
      dockerfile: cmd/gateway/Dockerfile
    container_name: parkir-gateway
    ports:
      - "11000:8080"
    environment:
      APP_NAME: parkir-pintar-gateway
      APP_ENV: local
      SERVER_PORT: "8080"
      JWT_SECRET: ${JWT_SECRET}
      GRPC_RESERVATION_TARGET: reservation:9090
      GRPC_SEARCH_TARGET: search:9090
      GRPC_PAYMENT_TARGET: payment:9090
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      DB_SSL_MODE: disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TRACING_ENABLED: "false"
      SERVER_ALLOWED_ORIGINS: "http://localhost:3000,http://100.79.123.39:3002,http://100.79.123.39:3000"
    depends_on:
      reservation:
        condition: service_healthy
      search:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  search:
    build:
      context: .
      dockerfile: cmd/search/Dockerfile
    container_name: parkir-search
    ports:
      - "11001:9090"
    environment:
      APP_NAME: parkir-pintar-search
      APP_ENV: local
      GRPC_SERVER_PORT: "9090"
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      DB_SCHEMA: search
      DB_SSL_MODE: disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TRACING_ENABLED: "false"
      NATS_ENABLED: "true"
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9090 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  reservation:
    build:
      context: .
      dockerfile: cmd/reservation/Dockerfile
    container_name: parkir-reservation
    ports:
      - "11002:9090"
    environment:
      APP_NAME: parkir-pintar-reservation
      APP_ENV: local
      GRPC_SERVER_PORT: "9090"
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      DB_SCHEMA: reservation
      DB_SSL_MODE: disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TRACING_ENABLED: "false"
      GRPC_BILLING_TARGET: billing:9090
      GRPC_PAYMENT_TARGET: payment:9090
      PAYMENT_TIMEOUT_MINUTES: "10"
      RESERVATION_EXPIRY_MINUTES: "60"
      ASYNQ_CONCURRENCY: "10"
      NATS_ENABLED: "true"
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      billing:
        condition: service_healthy
      payment:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9090 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  billing:
    build:
      context: .
      dockerfile: cmd/billing/Dockerfile
    container_name: parkir-billing
    ports:
      - "11003:9090"
    environment:
      APP_NAME: parkir-pintar-billing
      APP_ENV: local
      GRPC_SERVER_PORT: "9090"
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      DB_SCHEMA: billing
      DB_SSL_MODE: disable
      TRACING_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9090 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  payment:
    build:
      context: .
      dockerfile: cmd/payment/Dockerfile
    container_name: parkir-payment
    ports:
      - "11004:9090"
    environment:
      APP_NAME: parkir-pintar-payment
      APP_ENV: local
      GRPC_SERVER_PORT: "9090"
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      DB_SCHEMA: payment
      DB_SSL_MODE: disable
      TRACING_ENABLED: "false"
      NATS_ENABLED: "true"
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9090 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  presence:
    build:
      context: .
      dockerfile: cmd/presence/Dockerfile
    container_name: parkir-presence
    ports:
      - "11005:9090"
    environment:
      APP_NAME: parkir-pintar-presence
      APP_ENV: local
      GRPC_SERVER_PORT: "9090"
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      DB_SSL_MODE: disable
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TRACING_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9090 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  analytics:
    build:
      context: .
      dockerfile: cmd/analytics/Dockerfile
    container_name: parkir-analytics
    ports:
      - "11006:9095"
    environment:
      APP_NAME: parkir-pintar-analytics
      APP_ENV: local
      GRPC_SERVER_PORT: "9095"
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      DB_SCHEMA: analytics
      DB_SSL_MODE: disable
      TRACING_ENABLED: "false"
      NATS_ENABLED: "true"
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9095 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
  redis_data:
  nats_data:

networks:
  backend:
    driver: bridge
