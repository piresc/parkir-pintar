groups:
  - name: parkir-pintar-alerts
    rules:
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{status_code=~"5.."}[5m])) by (job)
            /
            sum(rate(http_requests_total[5m])) by (job)
          ) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate on {{ $labels.job }}"
          description: "{{ $labels.job }} has more than 5% of requests returning 5xx status codes over the last 5 minutes."

      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le, job)) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency on {{ $labels.job }}"
          description: "{{ $labels.job }} p95 latency is above 500ms for the last 5 minutes."

      - alert: HighGRPCErrorRate
        expr: |
          (
            sum(rate(grpc_requests_total{grpc_code!="OK"}[5m])) by (job)
            /
            sum(rate(grpc_requests_total[5m])) by (job)
          ) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High gRPC error rate on {{ $labels.job }}"
          description: "{{ $labels.job }} has more than 5% of gRPC requests failing over the last 5 minutes."

      - alert: HighSpanErrorRate
        expr: |
          (
            sum(rate(traces_spanmetrics_calls_total{status_code="STATUS_CODE_ERROR"}[5m])) by (service_name)
            /
            sum(rate(traces_spanmetrics_calls_total[5m])) by (service_name)
          ) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High trace error rate on {{ $labels.service_name }}"
          description: "{{ $labels.service_name }} has more than 5% of spans with error status over the last 5 minutes."

      - alert: HighSpanLatency
        expr: |
          histogram_quantile(0.95, sum(rate(traces_spanmetrics_duration_milliseconds_bucket[5m])) by (le, service_name)) > 500
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p95 span latency on {{ $labels.service_name }}"
          description: "{{ $labels.service_name }} p95 span duration is above 500ms for the last 5 minutes."

      - alert: NoTrafficDetected
        expr: |
          sum(rate(traces_spanmetrics_calls_total{span_kind="SPAN_KIND_SERVER"}[10m])) by (service_name) == 0
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "No traffic on {{ $labels.service_name }}"
          description: "{{ $labels.service_name }} has received no server spans for 10 minutes. Service may be down."

      - alert: DatabaseSlowQueries
        expr: |
          histogram_quantile(0.95, sum(rate(db_query_duration_seconds_bucket[5m])) by (le, job)) > 0.2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow database queries on {{ $labels.job }}"
          description: "{{ $labels.job }} p95 database query duration is above 200ms for the last 5 minutes."
