global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["monitoring-postgres-exporter:9187"]

  - job_name: "redis-exporter"
    static_configs:
      - targets: ["monitoring-redis-exporter:9121"]

  - job_name: "nats-exporter"
    static_configs:
      - targets: ["monitoring-nats-exporter:7777"]
