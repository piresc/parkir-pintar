# Docker Compose for ParkirPintar — Staging Environment
# Uses pre-built image from GHCR. No local builds.
# Copy .env.example to .env and fill in your values before running.

services:
  watchtower:
    image: containrrr/watchtower
    container_name: staging-watchtower
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: "60"
      WATCHTOWER_SCOPE: "parkir-staging"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:14-alpine
    container_name: staging-postgres
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - staging-postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_DATABASE}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7.0-alpine
    container_name: staging-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - staging-redis_data:/data
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nats:
    image: nats:2.11-alpine
    container_name: staging-nats
    command: ["--jetstream", "--store_dir=/data", "--http_port=8222"]
    volumes:
      - staging-nats_data:/data
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  gateway:
    image: ghcr.io/piresc/parkir-pintar:latest
    container_name: staging-gateway
    command: ["/app/gateway"]
    ports:
      - "8082:8080"
    environment:
      APP_NAME: parkir-pintar-gateway
      APP_ENV: staging
      SERVER_PORT: "8080"
      JWT_SECRET: ${JWT_SECRET}
      GRPC_RESERVATION_TARGET: reservation:9090
      GRPC_SEARCH_TARGET: search:9090
      GRPC_PAYMENT_TARGET: payment:9090
      GRPC_PRESENCE_TARGET: presence:9090
      DB_HOST: staging-postgres
      DB_PORT: "5432"
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      DB_SSL_MODE: disable
      REDIS_HOST: staging-redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NATS_URL: nats://staging-nats:4222
      TRACING_ENABLED: "true"
      TRACING_EXPORTER: "otlp-grpc"
      TRACING_OTLP_ENDPOINT: "monitoring-alloy:4319"
      TRACING_SAMPLE_RATE: "1.0"
      SERVER_ALLOWED_ORIGINS: "https://staging-parkir-pintar.piresc.dev,http://staging-parkir-pintar.piresc.dev"
    depends_on:
      reservation:
        condition: service_healthy
      search:
        condition: service_healthy
    networks:
      - backend
      - coolify
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "coolify.managed=true"
      - "traefik.http.routers.http-parkir-staging.entryPoints=http"
      - "traefik.http.routers.http-parkir-staging.rule=Host(`staging-parkir-pintar.piresc.dev`) && PathPrefix(`/`)"
      - "traefik.http.services.parkir-staging.loadbalancer.server.port=8080"
      - "com.centurylinklabs.watchtower.scope=parkir-staging"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  search:
    image: ghcr.io/piresc/parkir-pintar:latest
    container_name: staging-search
    labels:
      - "com.centurylinklabs.watchtower.scope=parkir-staging"
    command: ["/app/search"]
    environment:
      APP_NAME: parkir-pintar-search
      APP_ENV: staging
      GRPC_SERVER_PORT: "9090"
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: staging-postgres
      DB_PORT: "5432"
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      DB_SCHEMA: search
      DB_SSL_MODE: disable
      REDIS_HOST: staging-redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NATS_URL: nats://staging-nats:4222
      TRACING_ENABLED: "true"
      TRACING_EXPORTER: "otlp-grpc"
      TRACING_OTLP_ENDPOINT: "monitoring-alloy:4319"
      TRACING_SAMPLE_RATE: "1.0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - backend
      - coolify
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ps | grep -v grep | grep /app/search || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  reservation:
    image: ghcr.io/piresc/parkir-pintar:latest
    container_name: staging-reservation
    labels:
      - "com.centurylinklabs.watchtower.scope=parkir-staging"
    command: ["/app/reservation"]
    environment:
      APP_NAME: parkir-pintar-reservation
      APP_ENV: staging
      GRPC_SERVER_PORT: "9090"
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: staging-postgres
      DB_PORT: "5432"
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      DB_SCHEMA: reservation
      DB_SSL_MODE: disable
      REDIS_HOST: staging-redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NATS_URL: nats://staging-nats:4222
      TRACING_ENABLED: "true"
      TRACING_EXPORTER: "otlp-grpc"
      TRACING_OTLP_ENDPOINT: "monitoring-alloy:4319"
      TRACING_SAMPLE_RATE: "1.0"
      GRPC_BILLING_TARGET: billing:9090
      GRPC_PAYMENT_TARGET: payment:9090
      PAYMENT_TIMEOUT_MINUTES: "10"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      billing:
        condition: service_healthy
      payment:
        condition: service_healthy
    networks:
      - backend
      - coolify
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ps | grep -v grep | grep /app/reservation || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  billing:
    image: ghcr.io/piresc/parkir-pintar:latest
    container_name: staging-billing
    labels:
      - "com.centurylinklabs.watchtower.scope=parkir-staging"
    command: ["/app/billing"]
    environment:
      APP_NAME: parkir-pintar-billing
      APP_ENV: staging
      GRPC_SERVER_PORT: "9090"
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: staging-postgres
      DB_PORT: "5432"
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      DB_SCHEMA: billing
      DB_SSL_MODE: disable
      NATS_URL: nats://staging-nats:4222
      TRACING_ENABLED: "true"
      TRACING_EXPORTER: "otlp-grpc"
      TRACING_OTLP_ENDPOINT: "monitoring-alloy:4319"
      TRACING_SAMPLE_RATE: "1.0"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - backend
      - coolify
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ps | grep -v grep | grep /app/billing || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  payment:
    image: ghcr.io/piresc/parkir-pintar:latest
    container_name: staging-payment
    labels:
      - "com.centurylinklabs.watchtower.scope=parkir-staging"
    command: ["/app/payment"]
    environment:
      APP_NAME: parkir-pintar-payment
      APP_ENV: staging
      GRPC_SERVER_PORT: "9090"
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: staging-postgres
      DB_PORT: "5432"
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      DB_SCHEMA: payment
      DB_SSL_MODE: disable
      NATS_URL: nats://staging-nats:4222
      TRACING_ENABLED: "true"
      TRACING_EXPORTER: "otlp-grpc"
      TRACING_OTLP_ENDPOINT: "monitoring-alloy:4319"
      TRACING_SAMPLE_RATE: "1.0"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - backend
      - coolify
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ps | grep -v grep | grep /app/payment || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  presence:
    image: ghcr.io/piresc/parkir-pintar:latest
    container_name: staging-presence
    labels:
      - "com.centurylinklabs.watchtower.scope=parkir-staging"
    command: ["/app/presence"]
    environment:
      APP_NAME: parkir-pintar-presence
      APP_ENV: staging
      GRPC_SERVER_PORT: "9090"
      JWT_SECRET: ${JWT_SECRET}
      DB_HOST: staging-postgres
      DB_PORT: "5432"
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE}
      DB_SCHEMA: presence
      DB_SSL_MODE: disable
      REDIS_HOST: staging-redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      NATS_URL: nats://staging-nats:4222
      TRACING_ENABLED: "true"
      TRACING_EXPORTER: "otlp-grpc"
      TRACING_OTLP_ENDPOINT: "monitoring-alloy:4319"
      TRACING_SAMPLE_RATE: "1.0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    networks:
      - backend
      - coolify
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ps | grep -v grep | grep /app/presence || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  notification:
    image: ghcr.io/piresc/parkir-pintar:latest
    container_name: staging-notification
    labels:
      - "com.centurylinklabs.watchtower.scope=parkir-staging"
    command: ["/app/notification"]
    environment:
      APP_NAME: parkir-pintar-notification
      APP_ENV: staging
      GRPC_SERVER_PORT: "9090"
      JWT_SECRET: ${JWT_SECRET}
      NATS_URL: nats://staging-nats:4222
      TRACING_ENABLED: "true"
      TRACING_EXPORTER: "otlp-grpc"
      TRACING_OTLP_ENDPOINT: "monitoring-alloy:4319"
      TRACING_SAMPLE_RATE: "1.0"
    depends_on:
      nats:
        condition: service_healthy
    networks:
      - backend
      - coolify
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "ps | grep -v grep | grep /app/notification || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  staging-postgres_data:
  staging-redis_data:
  staging-nats_data:

networks:
  backend:
    driver: bridge
  coolify:
    external: true
