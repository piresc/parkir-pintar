apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: pirescer-monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.pirescer-monitoring.svc.cluster.local:9090
        isDefault: true
      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo.pirescer-monitoring.svc.cluster.local:3200
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.pirescer-monitoring.svc.cluster.local:3100
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-credentials
  namespace: pirescer-monitoring
type: Opaque
stringData:
  admin-user: admin
  admin-password: "CHANGE_ME"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: pirescer-monitoring
  labels:
    app: grafana
    workload: service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
        workload: service
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-credentials
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-credentials
                  key: admin-password
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: pirescer-monitoring
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      name: http
