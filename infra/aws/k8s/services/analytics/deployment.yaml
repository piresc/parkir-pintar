apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics
  namespace: pirescer-parkir-pintar
  labels:
    app: analytics
    workload: service
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  selector:
    matchLabels:
      app: analytics
  template:
    metadata:
      labels:
        app: analytics
        workload: service
    spec:
      containers:
        - name: analytics
          image: ghcr.io/piresc-repo/parkir-pintar/analytics:latest-prod
          ports:
            - containerPort: 9095
              name: grpc
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          env:
            - name: GRPC_PORT
              value: "9095"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            grpc:
              port: 9095
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            grpc:
              port: 9095
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: analytics
  namespace: pirescer-parkir-pintar
spec:
  selector:
    app: analytics
  ports:
    - port: 9095
      targetPort: 9095
      name: grpc
