apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing
  namespace: pirescer-parkir-pintar
  labels:
    app: billing
    workload: service
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  selector:
    matchLabels:
      app: billing
  template:
    metadata:
      labels:
        app: billing
        workload: service
    spec:
      containers:
        - name: billing
          image: ghcr.io/piresc/parkir-pintar/billing:latest-prod
          ports:
            - containerPort: 9092
              name: grpc
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          env:
            - name: GRPC_PORT
              value: "9092"
            - name: DB_SCHEMA
              value: "billing"
            - name: GRPC_PAYMENT_TARGET
              value: "payment:9093"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: billing
  namespace: pirescer-parkir-pintar
spec:
  selector:
    app: billing
  ports:
    - port: 9092
      targetPort: 9092
      name: grpc
