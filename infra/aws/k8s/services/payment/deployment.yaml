apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  namespace: parkir-pintar
  labels:
    app: payment
    workload: service
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  selector:
    matchLabels:
      app: payment
  template:
    metadata:
      labels:
        app: payment
        workload: service
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: payment
          image: ghcr.io/piresc-repo/parkir-pintar/payment:latest-prod
          ports:
            - containerPort: 9094
              name: grpc
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          env:
            - name: GRPC_PORT
              value: "9094"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            grpc:
              port: 9094
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            grpc:
              port: 9094
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: payment
  namespace: parkir-pintar
spec:
  selector:
    app: payment
  ports:
    - port: 9094
      targetPort: 9094
      name: grpc
