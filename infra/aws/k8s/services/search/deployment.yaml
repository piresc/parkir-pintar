apiVersion: apps/v1
kind: Deployment
metadata:
  name: search
  namespace: pirescer-parkir-pintar
  labels:
    app: search
    workload: service
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  selector:
    matchLabels:
      app: search
  template:
    metadata:
      labels:
        app: search
        workload: service
    spec:
      containers:
        - name: search
          image: ghcr.io/piresc/parkir-pintar/search:latest-prod
          ports:
            - containerPort: 9094
              name: grpc
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secrets
          env:
            - name: GRPC_PORT
              value: "9094"
            - name: DB_SCHEMA
              value: "search"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            tcpSocket:
              port: 9094
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: 9094
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: search
  namespace: pirescer-parkir-pintar
spec:
  selector:
    app: search
  ports:
    - port: 9094
      targetPort: 9094
      name: grpc
