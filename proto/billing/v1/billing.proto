syntax = "proto3";

package billing.v1;

option go_package = "parkir-pintar/proto/billing/v1;billingv1";

import "google/protobuf/timestamp.proto";

// BillingService handles fee calculation, invoice generation, and penalty application.
service BillingService {
  // StartBilling creates a billing record when a reservation is confirmed.
  rpc StartBilling(StartBillingRequest) returns (BillingResponse);
  // CalculateFee computes the parking fee based on actual session duration.
  rpc CalculateFee(CalculateFeeRequest) returns (BillingResponse);
  // GenerateInvoice generates an idempotent invoice for a reservation.
  rpc GenerateInvoice(GenerateInvoiceRequest) returns (BillingResponse);
  // ApplyPenalty applies a penalty (wrong-spot, no-show) to a billing record.
  rpc ApplyPenalty(ApplyPenaltyRequest) returns (BillingResponse);
  // ApplyOvernightFee applies the overnight flat fee to a billing record.
  rpc ApplyOvernightFee(ApplyOvernightFeeRequest) returns (BillingResponse);
}

message StartBillingRequest {
  string reservation_id = 1;
  int64 booking_fee = 2;
  string idempotency_key = 3;
}

message CalculateFeeRequest {
  string reservation_id = 1;
  google.protobuf.Timestamp check_in_at = 2;
  google.protobuf.Timestamp check_out_at = 3;
}

message GenerateInvoiceRequest {
  string reservation_id = 1;
  string idempotency_key = 2;
}

message ApplyPenaltyRequest {
  string reservation_id = 1;
  string penalty_type = 2;   // "wrong_spot" or "cancellation"
  int64 amount = 3;
  string description = 4;
}

message ApplyOvernightFeeRequest {
  string reservation_id = 1;
}

message BillingResponse {
  string id = 1;
  string reservation_id = 2;
  int64 booking_fee = 3;
  int64 parking_fee = 4;
  int64 overnight_fee = 5;
  int64 cancellation_fee = 6;
  int64 penalty_amount = 7;
  int64 total_amount = 8;
  int32 duration_minutes = 9;
  int32 billed_hours = 10;
  bool is_overnight = 11;
  string idempotency_key = 12;
  string status = 13;
}
