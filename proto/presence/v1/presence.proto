syntax = "proto3";

package presence.v1;

option go_package = "parkir-pintar/proto/presence/v1;presencev1";

// PresenceService verifies driver location against assigned parking spots.
service PresenceService {
  // VerifyLocation checks if a driver's GPS is within acceptable radius of their assigned spot.
  rpc VerifyLocation(VerifyLocationRequest) returns (VerifyLocationResponse);
  // UpdateDriverLocation stores the driver's current GPS coordinates.
  rpc UpdateDriverLocation(UpdateDriverLocationRequest) returns (UpdateDriverLocationResponse);
}

message VerifyLocationRequest {
  string driver_id = 1;
  double latitude = 2;
  double longitude = 3;
  string reservation_id = 4;
}

message VerifyLocationResponse {
  bool verified = 1;
  double distance_meters = 2;
  string assigned_spot_code = 3;
}

message UpdateDriverLocationRequest {
  string driver_id = 1;
  double latitude = 2;
  double longitude = 3;
  string reservation_id = 4;
}

message UpdateDriverLocationResponse {
  bool success = 1;
}
