syntax = "proto3";

package presence.v1;

option go_package = "parkir-pintar/proto/presence/v1;presencev1";

// PresenceService verifies driver presence at assigned parking spots using sensor data.
service PresenceService {
  // VerifyPresence checks if the assigned spot's sensor detects occupancy.
  rpc VerifyPresence(VerifyPresenceRequest) returns (VerifyPresenceResponse);
}

message VerifyPresenceRequest {
  string driver_id = 1;
  string reservation_id = 2;
  int32 floor_number = 3;
  int32 spot_number = 4;
}

message VerifyPresenceResponse {
  bool verified = 1;
  string message = 2;
}
