syntax = "proto3";

package presence.v1;

option go_package = "parkir-pintar/proto/presence/v1;presencev1";

import "google/protobuf/timestamp.proto";

// PresenceService handles location streaming, geofence arrival detection, and wrong-spot detection.
service PresenceService {
  // StreamLocation receives a stream of location updates from the driver app.
  rpc StreamLocation(stream LocationUpdate) returns (StreamLocationResponse);
  // DetectArrival checks if a driver has arrived within the parking geofence.
  rpc DetectArrival(DetectArrivalRequest) returns (ArrivalResponse);
  // DetectWrongSpot checks if a driver is parked in the wrong spot.
  rpc DetectWrongSpot(DetectWrongSpotRequest) returns (WrongSpotResponse);
  // GetPresence returns the latest known location for a reservation.
  rpc GetPresence(GetPresenceRequest) returns (PresenceResponse);
}

message LocationUpdate {
  string reservation_id = 1;
  double latitude = 2;
  double longitude = 3;
  double accuracy = 4;
  google.protobuf.Timestamp timestamp = 5;
}

message StreamLocationResponse {
  string status = 1;
}

message DetectArrivalRequest {
  string reservation_id = 1;
  double latitude = 2;
  double longitude = 3;
  double center_latitude = 4;
  double center_longitude = 5;
  double radius_meters = 6;
}

message ArrivalResponse {
  bool arrived = 1;
  string reservation_id = 2;
  google.protobuf.Timestamp detected_at = 3;
}

message DetectWrongSpotRequest {
  string reservation_id = 1;
  double latitude = 2;
  double longitude = 3;
  double spot_latitude = 4;
  double spot_longitude = 5;
  double threshold_meters = 6;
}

message WrongSpotResponse {
  bool is_wrong_spot = 1;
  double distance_meters = 2;
}

message GetPresenceRequest {
  string reservation_id = 1;
}

message PresenceResponse {
  string reservation_id = 1;
  double latitude = 2;
  double longitude = 3;
  double accuracy = 4;
  google.protobuf.Timestamp recorded_at = 5;
}
